version: '3.9'

services:
  app:
    build: .
    container_name: litterwatch-api
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/litter-detection-db
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 5000
      HTTPS_ENABLED: "false"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8080"
      RATE_LIMIT_MAX_REQUESTS: "100"
      RATE_LIMIT_WINDOW_MS: "900000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - litterwatch-net
    restart: unless-stopped
    volumes:
      - ./backend/logs:/app/backend/logs

  mongo:
    image: mongo:7.0
    container_name: litterwatch-mongo
    volumes:
      - mongo_data:/data/db
    networks:
      - litterwatch-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      MONGO_INITDB_DATABASE: litter-detection-db

  nginx:
    image: nginx:alpine
    container_name: litterwatch-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - litterwatch-net
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  litterwatch-net:
    driver: bridge
